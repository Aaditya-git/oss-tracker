<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaditya · OSS</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0b0f17;
      --surface:  #111720;
      --border:   rgba(255,255,255,0.06);
      --text-1:   #f0f6fc;
      --text-2:   #8b949e;
      --text-3:   #3d444d;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */
    header {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 32px 0;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text-1);
    }

    .subtitle {
      margin-top: 14px;
      font-size: 1rem;
      color: var(--text-2);
      font-weight: 400;
      line-height: 1.6;
      max-width: 480px;
    }

    /* ── Stats row ───────────────────────────── */
    .stats {
      display: flex;
      gap: 40px;
      margin-top: 52px;
      padding-bottom: 52px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stat-item { display: flex; flex-direction: column; gap: 4px; }

    .stat-num {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-1);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Grid ────────────────────────────────── */
    .grid-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 52px 32px 100px;
    }

    .grid-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    /* ── Company card ────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.5s ease-out forwards;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--c);
      opacity: 0.7;
      transition: opacity 0.22s;
    }

    .card:hover {
      transform: translateY(-3px);
      background: #151c27;
      border-color: rgba(255,255,255,0.1);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }

    .card:hover::before { opacity: 1; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-abbr {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--c);
      margin-bottom: 16px;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.3;
    }

    .card-count {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-top: 4px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
    }

    .tag {
      font-size: 0.64rem;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .card-arrow {
      position: absolute;
      bottom: 22px;
      right: 22px;
      font-size: 0.8rem;
      color: var(--text-3);
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--text-2);
      transform: translate(2px, -2px);
    }

    /* ── Modal ───────────────────────────────── */
    #modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #modal.open {
      opacity: 1;
      pointer-events: all;
    }

    #modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #modal-sheet {
      position: relative;
      width: 100%;
      max-height: 78vh;
      background: #0f1520;
      border-radius: 20px 20px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #modal.open #modal-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
      margin: 14px auto 0;
      flex-shrink: 0;
    }

    #modal-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #modal-abbr {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
    }

    #modal-sub {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-top: 2px;
    }

    .modal-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--text-1); }

    #modal-list {
      overflow-y: auto;
      padding: 8px 16px 24px;
      flex: 1;
    }

    /* ── Contribution row ────────────────────── */
    .contrib-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      opacity: 0;
      transform: translateY(8px);
      animation: rowIn 0.3s ease-out forwards;
    }

    .contrib-row:hover { background: rgba(255,255,255,0.04); }

    @keyframes rowIn { to { opacity: 1; transform: translateY(0); } }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .s-open    { background: #56d364; box-shadow: 0 0 6px #56d36480; }
    .s-claimed { background: #e3b341; box-shadow: 0 0 6px #e3b34180; }
    .s-merged  { background: #a371f7; box-shadow: 0 0 6px #a371f780; }
    .s-closed  { background: #3d444d; }

    .contrib-body { flex: 1; min-width: 0; }

    .contrib-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contrib-meta {
      display: flex;
      gap: 8px;
      margin-top: 3px;
      align-items: center;
    }

    .contrib-label {
      font-size: 0.65rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-3);
    }

    .contrib-repo {
      font-size: 0.65rem;
      color: var(--text-3);
    }

    .contrib-lang {
      font-size: 0.62rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .contrib-arrow {
      font-size: 0.75rem;
      color: var(--text-3);
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }

    .contrib-row:hover .contrib-arrow {
      color: var(--text-2);
      transform: translate(2px,-2px);
    }

    /* ── Legend ──────────────────────────────── */
    .legend {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 32px 52px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--text-3);
    }

    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Open Source · Data Engineering</div>
  <h1>Aaditya<br>Bhilegaonkar</h1>
  <p class="subtitle">Contributing to the tools that power data — one PR at a time.</p>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-num" data-target="5">0</span>
      <span class="stat-label">Open PRs</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" data-target="17">0</span>
      <span class="stat-label">Claimed</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" data-target="11">0</span>
      <span class="stat-label">Companies</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" data-target="13">0</span>
      <span class="stat-label">Repos</span>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot s-open"></div>Open PR</div>
  <div class="legend-item"><div class="legend-dot s-claimed"></div>Claimed</div>
  <div class="legend-item"><div class="legend-dot s-merged"></div>Merged</div>
  <div class="legend-item"><div class="legend-dot s-closed"></div>Closed</div>
</div>

<div class="grid-section">
  <div class="grid-label">Companies</div>
  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modal-backdrop"></div>
  <div id="modal-sheet">
    <div class="sheet-handle"></div>
    <div id="modal-header">
      <div id="modal-abbr"></div>
      <div>
        <div id="modal-title"></div>
        <div id="modal-sub"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-list"></div>
  </div>
</div>

<script>
const companies = [
  {
    id:'astronomer', name:'Astronomer', color:'#00BFB3', abbr:'AST',
    items:[
      {label:'PR #753',  title:'Operator aliases in YAML configs',        repo:'dag-factory',       status:'open',    url:'https://github.com/astronomer/dag-factory/pull/753',                lang:'Python'},
      {label:'PR #2734', title:'Reduce build_airflow_graph complexity',   repo:'astronomer-cosmos', status:'open',    url:'https://github.com/astronomer/astronomer-cosmos/pull/2734',         lang:'Python'},
      {label:'PR #2747', title:'Log redacted profile on cache miss',      repo:'astronomer-cosmos', status:'open',    url:'https://github.com/astronomer/astronomer-cosmos/pull/2747',         lang:'Python'},
      {label:'PR #2735', title:'Unify postgres profiles in dbt examples', repo:'astronomer-cosmos', status:'closed',  url:'https://github.com/astronomer/astronomer-cosmos/pull/2735',         lang:'Python'},
      {label:'PR #2159', title:'Shared constants for dev mode strings',   repo:'astro-cli',         status:'open',    url:'https://github.com/astronomer/astro-cli/pull/2159',                  lang:'Go'},
      {label:'PR #2160', title:'Remove duplicate mock resets',            repo:'astro-cli',         status:'open',    url:'https://github.com/astronomer/astro-cli/pull/2160',                  lang:'Go'},
    ]
  },
  {
    id:'tesla', name:'Tesla', color:'#E31937', abbr:'TSL',
    items:[
      {label:'#340', title:'Example config for MQTT over SSL',  repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/340', lang:'Go'},
      {label:'#354', title:'Configurable Partition Strategy',   repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/354', lang:'Go'},
      {label:'#273', title:'AWS SQS/SNS dispatcher',            repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/273', lang:'Go'},
    ]
  },
  {
    id:'amazon', name:'Amazon / AWS', color:'#FF9900', abbr:'AWS',
    items:[
      {label:'#3173', title:'to_iceberg: conditional merge',          repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3173', lang:'Python'},
      {label:'#3191', title:'EMR create_cluster bootstrap arguments', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3191', lang:'Python'},
      {label:'#2845', title:'athena.to_parquet overwrite_partitions', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/2845', lang:'Python'},
    ]
  },
  {
    id:'netflix', name:'Netflix', color:'#E50914', abbr:'NFX',
    items:[
      {label:'#3162', title:'Fix MetaflowTaggingError + tests',   repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3162', lang:'Python'},
      {label:'#3163', title:'Test coverage for plugins module',   repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3163', lang:'Python'},
    ]
  },
  {
    id:'airbyte', name:'Airbyte', color:'#4a9eff', abbr:'AIR',
    items:[
      {label:'#33874', title:'Fix broken links in docs',           repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/33874', lang:'Python'},
      {label:'#44038', title:'LinkedIn Ads: organizations stream', repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/44038', lang:'Python'},
    ]
  },
  {
    id:'trino', name:'Trino / Starburst', color:'#dd6b20', abbr:'TRN',
    items:[
      {label:'#28765', title:'Document truncate(number, position)', repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28765', lang:'Java'},
      {label:'#28687', title:'Update default Cassandra to 4.x',    repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28687', lang:'Java'},
    ]
  },
  {
    id:'iceberg', name:'Apache Iceberg', color:'#00bcd4', abbr:'ICE',
    items:[
      {label:'#15916', title:'Clarify Spark branch write precedence', repo:'iceberg', status:'claimed', url:'https://github.com/apache/iceberg/issues/15916', lang:'Python'},
    ]
  },
  {
    id:'meltano', name:'Meltano', color:'#9b59b6', abbr:'MLT',
    items:[
      {label:'#7327', title:'Add json-schema-for-humans schema doc', repo:'meltano', status:'claimed', url:'https://github.com/meltano/meltano/issues/7327', lang:'Python'},
    ]
  },
  {
    id:'beam', name:'Apache Beam', color:'#34a853', abbr:'BEM',
    items:[
      {label:'#35935', title:'Update Python side input example', repo:'beam', status:'claimed', url:'https://github.com/apache/beam/issues/35935', lang:'Python'},
    ]
  },
  {
    id:'airflow', name:'Apache Airflow', color:'#017cee', abbr:'AF',
    items:[
      {label:'#67336', title:'Dashboard wrong % when count exceeds cap', repo:'airflow', status:'claimed', url:'https://github.com/apache/airflow/issues/67336', lang:'Python'},
    ]
  },
  {
    id:'kestra', name:'Kestra', color:'#7c3aed', abbr:'KST',
    items:[
      {label:'#15987', title:'Log Kestra UI URL when server is ready', repo:'kestra', status:'claimed', url:'https://github.com/kestra-io/kestra/issues/15987', lang:'Java'},
    ]
  },
];

// ── Build grid cards ─────────────────────────
const grid = document.getElementById('grid');

companies.forEach((company, i) => {
  const langs = [...new Set(company.items.map(x => x.lang))];
  const statuses = [...new Set(company.items.map(x => x.status))];

  const card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = `--c: ${company.color}; animation-delay: ${i * 0.06}s`;
  card.innerHTML = `
    <div class="card-abbr">${company.abbr}</div>
    <div class="card-name">${company.name}</div>
    <div class="card-count">${company.items.length} contribution${company.items.length > 1 ? 's' : ''}</div>
    <div class="card-tags">
      ${langs.map(l => `<span class="tag">${l}</span>`).join('')}
    </div>
    <div class="card-arrow">↗</div>`;

  card.addEventListener('click', () => openModal(company));
  grid.appendChild(card);
});

// ── Modal logic ──────────────────────────────
const modal       = document.getElementById('modal');
const modalAbbr   = document.getElementById('modal-abbr');
const modalTitle  = document.getElementById('modal-title');
const modalSub    = document.getElementById('modal-sub');
const modalList   = document.getElementById('modal-list');
const closeBtn    = document.getElementById('modal-close');
const backdrop    = document.getElementById('modal-backdrop');

function openModal(company) {
  modalAbbr.textContent  = company.abbr;
  modalAbbr.style.color  = company.color;
  modalTitle.textContent = company.name;
  modalSub.textContent   = `${company.items.length} contribution${company.items.length > 1 ? 's' : ''}`;
  modalList.innerHTML    = '';

  company.items.forEach((item, i) => {
    const a = document.createElement('a');
    a.className = 'contrib-row';
    a.href      = item.url;
    a.target    = '_blank';
    a.rel       = 'noopener';
    a.style.animationDelay = `${i * 0.055}s`;

    const statusClass = { open:'s-open', claimed:'s-claimed', merged:'s-merged', closed:'s-closed' }[item.status];

    a.innerHTML = `
      <div class="status-dot ${statusClass}"></div>
      <div class="contrib-body">
        <div class="contrib-title">${item.title}</div>
        <div class="contrib-meta">
          <span class="contrib-label">${item.label}</span>
          <span class="contrib-repo">${item.repo}</span>
          <span class="contrib-lang">${item.lang}</span>
        </div>
      </div>
      <div class="contrib-arrow">↗</div>`;

    modalList.appendChild(a);
  });

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Stat counters ─────────────────────────────
function countUp(el) {
  const target = parseInt(el.dataset.target);
  const duration = 1000;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(ease * target);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { countUp(e.target); observer.unobserve(e.target); }});
}, { threshold: 0.5 });

document.querySelectorAll('.stat-num').forEach(el => observer.observe(el));
</script>
</body>
</html>
