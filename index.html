<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaditya · OSS Contributions</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070b12;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 28px 48px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header-left h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0f6fc;
      letter-spacing: -0.02em;
    }

    .header-left p {
      font-size: 0.78rem;
      color: #484f58;
      margin-top: 3px;
    }

    .stats { display: flex; gap: 28px; }

    .stat { text-align: right; }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f6fc;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
    }

    .legend {
      position: relative;
      z-index: 10;
      padding: 10px 48px;
      display: flex;
      gap: 20px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      color: #484f58;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .legend-hint {
      margin-left: auto;
      font-size: 0.65rem;
      color: #30363d;
    }

    #dag-scroll {
      position: relative;
      z-index: 1;
      overflow: auto;
      padding: 48px 48px 80px;
    }

    #dag-canvas { position: relative; }

    #svg-layer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    .node {
      position: absolute;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .node-source {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(240,246,252,0.05);
      border: 1px solid rgba(240,246,252,0.12);
      cursor: default;
    }

    .node-source:hover { transform: none !important; }

    .src-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: #f0f6fc;
      letter-spacing: 0.01em;
    }

    .src-sub {
      font-size: 0.6rem;
      color: #484f58;
      margin-top: 3px;
    }

    .pulse-ring {
      position: absolute;
      inset: -7px;
      border-radius: 15px;
      border: 1px solid rgba(240,246,252,0.08);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 0.1; transform: scale(1.05); }
    }

    .node-company {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 13px;
      border: 1px solid;
      background: rgba(0,0,0,0.5);
    }

    .company-abbr {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .company-name-text {
      font-size: 0.76rem;
      font-weight: 600;
      color: #e6edf3;
      white-space: nowrap;
    }

    .node-item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 13px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(10,14,20,0.85);
    }

    .node-item:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }

    .item-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }

    .item-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-open    .item-status-dot { background: #56d364; box-shadow: 0 0 5px #56d364; }
    .status-claimed .item-status-dot { background: #e3b341; box-shadow: 0 0 5px #e3b341; }
    .status-merged  .item-status-dot { background: #a371f7; box-shadow: 0 0 5px #a371f7; }
    .status-closed  .item-status-dot { background: #484f58; }

    .item-label {
      font-size: 0.65rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #8b949e;
    }

    .item-title {
      font-size: 0.78rem;
      font-weight: 500;
      color: #e6edf3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-bottom {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
    }

    .item-repo { font-size: 0.63rem; color: #484f58; }

    .item-lang {
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: #8b949e;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .conn-path {
      fill: none;
      stroke-width: 1.5;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawLine 1s ease forwards;
    }

    @keyframes drawLine { to { stroke-dashoffset: 0; } }

    #tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.73rem;
      color: #e6edf3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 9999;
      max-width: 260px;
    }

    #tooltip.show { opacity: 1; }

    .tt-title { font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .tt-meta  { color: #8b949e; font-size: 0.68rem; }
    .tt-hint  { color: #58a6ff; font-size: 0.66rem; margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Aaditya Bhilegaonkar</h1>
    <p>Data Engineer &nbsp;·&nbsp; Open Source Contribution Pipeline</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">5</div><div class="stat-label">Open PRs</div></div>
    <div class="stat"><div class="stat-num">17</div><div class="stat-label">Claimed</div></div>
    <div class="stat"><div class="stat-num">11</div><div class="stat-label">Companies</div></div>
    <div class="stat"><div class="stat-num">13</div><div class="stat-label">Repos</div></div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#56d364;box-shadow:0 0 5px #56d364"></div>Open PR</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e3b341;box-shadow:0 0 5px #e3b341"></div>Claimed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a371f7;box-shadow:0 0 5px #a371f7"></div>Merged</div>
  <div class="legend-item"><div class="legend-dot" style="background:#484f58"></div>Closed</div>
  <div class="legend-hint">Click any contribution to open on GitHub</div>
</div>

<div id="dag-scroll">
  <div id="dag-canvas">
    <svg id="svg-layer"></svg>
    <div id="nodes-layer"></div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta"  id="tt-meta"></div>
  <div class="tt-hint">Click to open on GitHub</div>
</div>

<script>
const companies = [
  {
    id:'astronomer', name:'Astronomer', color:'#00BFB3', abbr:'AST',
    items:[
      {label:'PR #753',  title:'Operator aliases in YAML configs',        repo:'dag-factory',       status:'open',   url:'https://github.com/astronomer/dag-factory/pull/753',                lang:'Python'},
      {label:'PR #2734', title:'Reduce build_airflow_graph complexity',   repo:'astronomer-cosmos', status:'open',   url:'https://github.com/astronomer/astronomer-cosmos/pull/2734',         lang:'Python'},
      {label:'PR #2747', title:'Log redacted profile on cache miss',      repo:'astronomer-cosmos', status:'open',   url:'https://github.com/astronomer/astronomer-cosmos/pull/2747',         lang:'Python'},
      {label:'PR #2735', title:'Unify postgres profiles in dbt examples', repo:'astronomer-cosmos', status:'closed', url:'https://github.com/astronomer/astronomer-cosmos/pull/2735',         lang:'Python'},
      {label:'PR #2159', title:'Shared constants for dev mode strings',   repo:'astro-cli',         status:'open',   url:'https://github.com/astronomer/astro-cli/pull/2159',                  lang:'Go'},
      {label:'PR #2160', title:'Remove duplicate mock resets',            repo:'astro-cli',         status:'open',   url:'https://github.com/astronomer/astro-cli/pull/2160',                  lang:'Go'},
    ]
  },
  {
    id:'tesla', name:'Tesla', color:'#E31937', abbr:'TSL',
    items:[
      {label:'#340', title:'Example config for MQTT over SSL',  repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/340', lang:'Go'},
      {label:'#354', title:'Configurable Partition Strategy',   repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/354', lang:'Go'},
      {label:'#273', title:'AWS SQS/SNS dispatcher',            repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/273', lang:'Go'},
    ]
  },
  {
    id:'amazon', name:'Amazon / AWS', color:'#FF9900', abbr:'AWS',
    items:[
      {label:'#3173', title:'to_iceberg: conditional merge',          repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3173', lang:'Python'},
      {label:'#3191', title:'EMR create_cluster bootstrap arguments', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3191', lang:'Python'},
      {label:'#2845', title:'athena.to_parquet overwrite_partitions', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/2845', lang:'Python'},
    ]
  },
  {
    id:'netflix', name:'Netflix', color:'#E50914', abbr:'NFX',
    items:[
      {label:'#3162', title:'Fix MetaflowTaggingError + tests',   repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3162', lang:'Python'},
      {label:'#3163', title:'Test coverage for plugins module',   repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3163', lang:'Python'},
    ]
  },
  {
    id:'airbyte', name:'Airbyte', color:'#4a9eff', abbr:'AIR',
    items:[
      {label:'#33874', title:'Fix broken links in docs',            repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/33874', lang:'Python'},
      {label:'#44038', title:'LinkedIn Ads: organizations stream',  repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/44038', lang:'Python'},
    ]
  },
  {
    id:'trino', name:'Trino / Starburst', color:'#dd6b20', abbr:'TRN',
    items:[
      {label:'#28765', title:'Document truncate(number, position)', repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28765', lang:'Java'},
      {label:'#28687', title:'Update default Cassandra to 4.x',    repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28687', lang:'Java'},
    ]
  },
  {
    id:'iceberg', name:'Apache Iceberg', color:'#00bcd4', abbr:'ICE',
    items:[
      {label:'#15916', title:'Clarify Spark branch write precedence', repo:'iceberg', status:'claimed', url:'https://github.com/apache/iceberg/issues/15916', lang:'Python'},
    ]
  },
  {
    id:'meltano', name:'Meltano', color:'#9b59b6', abbr:'MLT',
    items:[
      {label:'#7327', title:'Add json-schema-for-humans schema doc', repo:'meltano', status:'claimed', url:'https://github.com/meltano/meltano/issues/7327', lang:'Python'},
    ]
  },
  {
    id:'beam', name:'Apache Beam', color:'#34a853', abbr:'BEM',
    items:[
      {label:'#35935', title:'Update Python side input example', repo:'beam', status:'claimed', url:'https://github.com/apache/beam/issues/35935', lang:'Python'},
    ]
  },
  {
    id:'airflow', name:'Apache Airflow', color:'#017cee', abbr:'AF',
    items:[
      {label:'#67336', title:'Dashboard wrong % when count exceeds cap', repo:'airflow', status:'claimed', url:'https://github.com/apache/airflow/issues/67336', lang:'Python'},
    ]
  },
  {
    id:'kestra', name:'Kestra', color:'#7c3aed', abbr:'KST',
    items:[
      {label:'#15987', title:'Log Kestra UI URL when server is ready', repo:'kestra', status:'claimed', url:'https://github.com/kestra-io/kestra/issues/15987', lang:'Java'},
    ]
  },
];

// Layout
const SRC_W=110, SRC_H=52, CMP_W=152, CMP_H=44, ITM_W=264, ITM_H=54;
const ITM_GAP=10, CMP_GAP=30, PAD_TOP=16;
const COL1_X=0, COL2_X=COL1_X+SRC_W+110, COL3_X=COL2_X+CMP_W+100;

let y = PAD_TOP;
const layout = companies.map(c => {
  const gh = c.items.length*(ITM_H+ITM_GAP)-ITM_GAP;
  const cy = y + gh/2 - CMP_H/2;
  const items = c.items.map((item,i) => ({...item, x:COL3_X, y:y+i*(ITM_H+ITM_GAP)}));
  y += gh + CMP_GAP;
  return {...c, x:COL2_X, y:cy, items};
});

const totalH = y - CMP_GAP + PAD_TOP + 20;
const srcY = totalH/2 - SRC_H/2;
const totalW = COL3_X + ITM_W + 24;

const canvas = document.getElementById('dag-canvas');
canvas.style.width = totalW+'px';
canvas.style.height = totalH+'px';

const svg = document.getElementById('svg-layer');
svg.setAttribute('width', totalW);
svg.setAttribute('height', totalH);

const nl = document.getElementById('nodes-layer');
const tip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttMeta  = document.getElementById('tt-meta');

function bez(x1,y1,x2,y2){
  const cx=(x1+x2)/2;
  return `M${x1} ${y1} C${cx} ${y1} ${cx} ${y2} ${x2} ${y2}`;
}

function mkNode(tag, cls, styles, html){
  const el = document.createElement(tag);
  el.className = cls;
  Object.assign(el.style, styles);
  el.innerHTML = html;
  nl.appendChild(el);
  return el;
}

// Source node
mkNode('div','node node-source',
  {left:COL1_X+'px', top:srcY+'px', width:SRC_W+'px', height:SRC_H+'px'},
  `<div class="pulse-ring"></div><div class="src-name">Aaditya</div><div class="src-sub">Data Engineer</div>`
);

let delay = 0;
layout.forEach(company => {
  const cmpMidY = company.y + CMP_H/2;
  const srcMidY = srcY + SRC_H/2;

  // Company node
  mkNode('div','node node-company',
    {left:company.x+'px', top:company.y+'px', width:CMP_W+'px', height:CMP_H+'px',
     borderColor: company.color+'44', color: company.color},
    `<span class="company-abbr">${company.abbr}</span><span class="company-name-text">${company.name}</span>`
  );

  // Src → Company path
  const p1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  p1.setAttribute('d', bez(COL1_X+SRC_W, srcMidY, company.x, cmpMidY));
  p1.setAttribute('class','conn-path');
  p1.setAttribute('stroke', company.color);
  p1.setAttribute('opacity','0.22');
  p1.style.animationDelay = (delay*0.055)+'s';
  svg.appendChild(p1);
  delay++;

  // Item nodes
  company.items.forEach(item => {
    const itmMidY = item.y + ITM_H/2;

    const a = document.createElement('a');
    a.className = `node node-item status-${item.status}`;
    a.href = item.url;
    a.target = '_blank';
    a.rel = 'noopener';
    Object.assign(a.style, {left:item.x+'px', top:item.y+'px', width:ITM_W+'px', height:ITM_H+'px'});
    a.innerHTML = `
      <div class="item-top">
        <div class="item-status-dot"></div>
        <span class="item-label">${item.label}</span>
      </div>
      <div class="item-title">${item.title}</div>
      <div class="item-bottom">
        <span class="item-repo">${item.repo}</span>
        <span class="item-lang">${item.lang}</span>
      </div>`;
    nl.appendChild(a);

    // Company → Item path
    const p2 = document.createElementNS('http://www.w3.org/2000/svg','path');
    p2.setAttribute('d', bez(company.x+CMP_W, cmpMidY, item.x, itmMidY));
    p2.setAttribute('class','conn-path');
    p2.setAttribute('stroke', company.color);
    p2.setAttribute('opacity','0.18');
    p2.style.animationDelay = (delay*0.055)+'s';
    svg.appendChild(p2);
    delay++;

    // Tooltip
    a.addEventListener('mouseenter', () => {
      ttTitle.textContent = item.title;
      ttMeta.textContent  = `${item.repo} · ${item.lang} · ${item.status}`;
      tip.classList.add('show');
    });
    a.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY-8)+'px';
    });
    a.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });
});
</script>
</body>
</html>
