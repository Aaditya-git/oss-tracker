<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaditya Bhilegaonkar</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #111111;
      --surface:  #1a1a1a;
      --border:   rgba(255,255,255,0.07);
      --t1:       #f0f0f0;
      --t2:       #888888;
      --t3:       #444444;
      --pill-bg:  rgba(255,255,255,0.06);
      --pill-active: rgba(255,255,255,0.12);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* ── Page wrapper ──────────────────── */
    .page {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── Hero ──────────────────────────── */
    .hero {
      padding-top: 80px;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--border);
    }

    .hero-tag {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 22px;
    }

    .hero-name {
      font-size: clamp(2.6rem, 7vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--t1);
    }

    .hero-sub {
      margin-top: 16px;
      font-size: 1.05rem;
      color: var(--t2);
      line-height: 1.55;
      max-width: 400px;
    }

    /* ── Stats ─────────────────────────── */
    .stats-row {
      display: flex;
      gap: 36px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 3px; }

    .stat-n {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--t1);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-l {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
    }

    /* ── Filters ───────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .pill {
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--pill-bg);
      color: var(--t2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .pill:hover { color: var(--t1); border-color: rgba(255,255,255,0.14); }

    .pill.active {
      background: var(--pill-active);
      color: var(--t1);
      border-color: rgba(255,255,255,0.18);
    }

    /* ── Company sections ──────────────── */
    .company-block {
      padding-top: 40px;
    }

    .company-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
    }

    .company-name {
      font-size: 0.68rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--t3);
      font-weight: 600;
    }

    .company-repos {
      font-size: 0.68rem;
      color: var(--t3);
      letter-spacing: 0;
      text-transform: none;
      font-weight: 400;
    }

    /* ── Contribution rows ─────────────── */
    .contrib-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background 0.15s;
      border-radius: 6px;
      margin: 0 -10px;
      padding-left: 10px;
      padding-right: 10px;
    }

    .contrib-row:hover {
      background: rgba(255,255,255,0.04);
    }

    .contrib-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 60%;
      width: 1.5px;
      background: var(--c, transparent);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .contrib-row:hover::before { opacity: 1; }

    .s-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .s-open    { background: #4ade80; box-shadow: 0 0 7px #4ade8077; }
    .s-claimed { background: #fbbf24; box-shadow: 0 0 7px #fbbf2477; }
    .s-merged  { background: #c084fc; box-shadow: 0 0 7px #c084fc77; }
    .s-closed  { background: #3a3a3a; }

    .contrib-label {
      font-size: 0.72rem;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', monospace;
      color: var(--t3);
      min-width: 68px;
      flex-shrink: 0;
    }

    .contrib-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contrib-lang {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--t2);
      flex-shrink: 0;
    }

    .contrib-arrow {
      font-size: 0.7rem;
      color: var(--t3);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .contrib-row:hover .contrib-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    /* ── Hidden rows (filter) ──────────── */
    .contrib-row.hidden {
      display: none;
    }

    /* ── Empty state ───────────────────── */
    .empty {
      padding: 48px 0;
      text-align: center;
      color: var(--t3);
      font-size: 0.85rem;
      display: none;
    }

    /* ── Fade-in ───────────────────────── */
    .fadein {
      opacity: 0;
      transform: translateY(12px);
      animation: fi 0.5s ease-out forwards;
    }

    @keyframes fi { to { opacity: 1; transform: translateY(0); } }

    /* ── Footer ────────────────────────── */
    footer {
      max-width: 660px;
      margin: 72px auto 0;
      padding: 0 28px;
      font-size: 0.72rem;
      color: var(--t3);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-tag">Open Source Contributions</div>
    <h1 class="hero-name">Aaditya<br>Bhilegaonkar</h1>
    <p class="hero-sub">Data Engineer. Contributing to the tools that power data.</p>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-n" data-target="5">0</span>
        <span class="stat-l">Open PRs</span>
      </div>
      <div class="stat">
        <span class="stat-n" data-target="17">0</span>
        <span class="stat-l">Claimed</span>
      </div>
      <div class="stat">
        <span class="stat-n" data-target="11">0</span>
        <span class="stat-l">Companies</span>
      </div>
      <div class="stat">
        <span class="stat-n" data-target="13">0</span>
        <span class="stat-l">Repos</span>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="open">Open PRs</div>
    <div class="pill" data-filter="claimed">Claimed</div>
    <div class="pill" data-filter="merged">Merged</div>
    <div class="pill" data-filter="closed">Closed</div>
  </div>

  <!-- Contribution list -->
  <div id="list"></div>

  <div class="empty" id="empty">Nothing here yet.</div>

</div>

<footer>
  <span>Aaditya Bhilegaonkar</span>
  <span>Updated May 2026</span>
</footer>

<script>
const companies = [
  {
    name: 'Astronomer', color: '#00BFB3',
    repos: 'dag-factory, astronomer-cosmos, astro-cli',
    items: [
      { label:'PR #753',  title:'Operator aliases in YAML configs',        repo:'dag-factory',       status:'open',    url:'https://github.com/astronomer/dag-factory/pull/753',                lang:'Python' },
      { label:'PR #2734', title:'Reduce build_airflow_graph complexity',   repo:'astronomer-cosmos', status:'open',    url:'https://github.com/astronomer/astronomer-cosmos/pull/2734',         lang:'Python' },
      { label:'PR #2747', title:'Log redacted profile on cache miss',      repo:'astronomer-cosmos', status:'open',    url:'https://github.com/astronomer/astronomer-cosmos/pull/2747',         lang:'Python' },
      { label:'PR #2735', title:'Unify postgres profiles in dbt examples', repo:'astronomer-cosmos', status:'closed',  url:'https://github.com/astronomer/astronomer-cosmos/pull/2735',         lang:'Python' },
      { label:'PR #2159', title:'Shared constants for dev mode strings',   repo:'astro-cli',         status:'open',    url:'https://github.com/astronomer/astro-cli/pull/2159',                  lang:'Go'     },
      { label:'PR #2160', title:'Remove duplicate mock resets',            repo:'astro-cli',         status:'open',    url:'https://github.com/astronomer/astro-cli/pull/2160',                  lang:'Go'     },
    ]
  },
  {
    name: 'Tesla', color: '#ef4444',
    repos: 'fleet-telemetry',
    items: [
      { label:'#340', title:'Example config for MQTT over SSL',  repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/340', lang:'Go' },
      { label:'#354', title:'Configurable Partition Strategy',   repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/354', lang:'Go' },
      { label:'#273', title:'AWS SQS/SNS dispatcher',            repo:'fleet-telemetry', status:'claimed', url:'https://github.com/teslamotors/fleet-telemetry/issues/273', lang:'Go' },
    ]
  },
  {
    name: 'Amazon / AWS', color: '#f97316',
    repos: 'aws-sdk-pandas',
    items: [
      { label:'#3173', title:'to_iceberg: conditional merge',          repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3173', lang:'Python' },
      { label:'#3191', title:'EMR create_cluster bootstrap arguments', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/3191', lang:'Python' },
      { label:'#2845', title:'athena.to_parquet overwrite_partitions', repo:'aws-sdk-pandas', status:'claimed', url:'https://github.com/aws/aws-sdk-pandas/issues/2845', lang:'Python' },
    ]
  },
  {
    name: 'Netflix', color: '#ef4444',
    repos: 'metaflow',
    items: [
      { label:'#3162', title:'Fix MetaflowTaggingError formatting + tests', repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3162', lang:'Python' },
      { label:'#3163', title:'Test coverage for plugins module',            repo:'metaflow', status:'claimed', url:'https://github.com/Netflix/metaflow/issues/3163', lang:'Python' },
    ]
  },
  {
    name: 'Airbyte', color: '#3b82f6',
    repos: 'airbyte',
    items: [
      { label:'#33874', title:'Fix broken links in docs',           repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/33874', lang:'Python' },
      { label:'#44038', title:'LinkedIn Ads: organizations stream', repo:'airbyte', status:'claimed', url:'https://github.com/airbytehq/airbyte/issues/44038', lang:'Python' },
    ]
  },
  {
    name: 'Trino / Starburst', color: '#f59e0b',
    repos: 'trino',
    items: [
      { label:'#28765', title:'Document truncate(number, position)', repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28765', lang:'Java' },
      { label:'#28687', title:'Update default Cassandra to 4.x',    repo:'trino', status:'claimed', url:'https://github.com/trinodb/trino/issues/28687', lang:'Java' },
    ]
  },
  {
    name: 'Apache Iceberg', color: '#06b6d4',
    repos: 'iceberg',
    items: [
      { label:'#15916', title:'Clarify Spark branch write precedence docs', repo:'iceberg', status:'claimed', url:'https://github.com/apache/iceberg/issues/15916', lang:'Python' },
    ]
  },
  {
    name: 'Meltano', color: '#a855f7',
    repos: 'meltano',
    items: [
      { label:'#7327', title:'Add json-schema-for-humans schema doc', repo:'meltano', status:'claimed', url:'https://github.com/meltano/meltano/issues/7327', lang:'Python' },
    ]
  },
  {
    name: 'Apache Beam', color: '#22c55e',
    repos: 'beam',
    items: [
      { label:'#35935', title:'Update Python slowly updating side input', repo:'beam', status:'claimed', url:'https://github.com/apache/beam/issues/35935', lang:'Python' },
    ]
  },
  {
    name: 'Apache Airflow', color: '#3b82f6',
    repos: 'airflow',
    items: [
      { label:'#67336', title:'Dashboard wrong % when state count exceeds cap', repo:'airflow', status:'claimed', url:'https://github.com/apache/airflow/issues/67336', lang:'Python' },
    ]
  },
  {
    name: 'Kestra', color: '#8b5cf6',
    repos: 'kestra',
    items: [
      { label:'#15987', title:'Log Kestra UI URL when server is ready', repo:'kestra', status:'claimed', url:'https://github.com/kestra-io/kestra/issues/15987', lang:'Java' },
    ]
  },
];

const dotClass = { open: 's-open', claimed: 's-claimed', merged: 's-merged', closed: 's-closed' };
const list = document.getElementById('list');

// Render all company sections
companies.forEach((company, ci) => {
  const block = document.createElement('div');
  block.className = 'company-block fadein';
  block.style.animationDelay = `${ci * 0.04}s`;

  block.innerHTML = `
    <div class="company-header">
      <span class="company-name">${company.name}</span>
      <span class="company-repos">${company.repos}</span>
    </div>`;

  company.items.forEach(item => {
    const a = document.createElement('a');
    a.className = `contrib-row`;
    a.href = item.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.dataset.status = item.status;
    a.style.setProperty('--c', company.color);

    a.innerHTML = `
      <div class="s-dot ${dotClass[item.status]}"></div>
      <span class="contrib-label">${item.label}</span>
      <span class="contrib-title">${item.title}</span>
      <span class="contrib-lang">${item.lang}</span>
      <span class="contrib-arrow">↗</span>`;

    block.appendChild(a);
  });

  list.appendChild(block);
});

// Filter logic
let active = 'all';

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    active = pill.dataset.filter;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    let visible = 0;
    document.querySelectorAll('.contrib-row').forEach(row => {
      const show = active === 'all' || row.dataset.status === active;
      row.classList.toggle('hidden', !show);
      if (show) visible++;
    });

    // Hide company headers with no visible rows
    document.querySelectorAll('.company-block').forEach(block => {
      const hasVisible = [...block.querySelectorAll('.contrib-row')].some(r => !r.classList.contains('hidden'));
      block.style.display = hasVisible ? '' : 'none';
    });

    document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';
  });
});

// Count-up stats
function countUp(el) {
  const target = +el.dataset.target;
  const dur = 1100;
  const t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 4);
    el.textContent = Math.floor(e * target);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target;
  })(t0);
}

const io = new IntersectionObserver(entries => {
  entries.forEach(en => { if (en.isIntersecting) { countUp(en.target); io.unobserve(en.target); } });
}, { threshold: 0.5 });

document.querySelectorAll('[data-target]').forEach(el => io.observe(el));
</script>
</body>
</html>
